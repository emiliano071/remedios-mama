<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Remedios 💊</title>

  <!-- Librería de Supabase y Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #0f172a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px 15px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--card-bg);
      padding: 25px 20px;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      text-align: center;
      margin-bottom: 20px;
    }

    .icon-box {
      font-size: 3.5rem;
      margin-bottom: 10px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0% { transform: scale(0.5); }
      100% { transform: scale(1); }
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      color: var(--text);
    }

    .status {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .exito { color: var(--success); }
    .normal { color: var(--primary); }

    .detalle {
      color: #64748b;
      font-size: 0.95rem;
      margin: 0;
    }

    /* Estado de Hoy */
    .banner-estado {
      padding: 12px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .completado { background-color: #dcfce7; color: #15803d; }
    .pendiente { background-color: #fef2f2; color: #b91c1c; }

    /* Historial */
    .historial-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 5px;
    }

    .historial-header h3 {
      font-size: 1rem;
      color: #475569;
      margin: 0;
    }

    .lista-tomas {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .toma-item {
      background: var(--card-bg);
      padding: 14px 16px;
      border-radius: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .toma-item:first-child {
      border: 2px solid #bbf7d0;
    }

    .fecha-tag {
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hora-tag {
      color: #64748b;
      font-size: 0.85rem;
      background: #f1f5f9;
      padding: 4px 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Tarjeta Principal -->
    <div class="card">
      <div id="icono" class="icon-box">💊</div>
      <h2 id="titulo">Control de Remedios</h2>
      <div id="mensaje" class="status normal">Cargando...</div>
      <p id="detalle" class="detalle"></p>
    </div>

    <!-- Sección de Historial para ti -->
    <div id="seccion-historial" style="display: none;">
      
      <!-- Banner de estado diario -->
      <div id="banner-hoy" class="banner-estado pendiente">
        ⏳ Verificando la toma de hoy...
      </div>

      <div class="historial-header">
        <h3>📋 Registro de Tomas</h3>
      </div>

      <ul id="lista" class="lista-tomas">
        <li style="text-align: center; color: #94a3b8; padding: 20px;">Cargando historial...</li>
      </ul>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://cajtmasncuswlmupjrqe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_uldRavgakeaFmZ4JbdBHcw_0of6g83J';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CLAVE_NFC_VALIDA = 'TOMAR_REMEDIO_SECRET_123';

    async function cargarHistorial() {
      const seccionHistorial = document.getElementById('seccion-historial');
      const listaEl = document.getElementById('lista');
      const bannerHoy = document.getElementById('banner-hoy');
      seccionHistorial.style.display = 'block';

      const { data, error } = await db
        .from('tomas_remedios')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(10);

      if (error) {
        listaEl.innerHTML = '<li class="toma-item">Error al cargar historial</li>';
        return;
      }

      if (!data || data.length === 0) {
        listaEl.innerHTML = '<li class="toma-item">Aún no hay tomas registradas.</li>';
        bannerHoy.className = "banner-estado pendiente";
        bannerHoy.innerHTML = "⚠️ Aún no hay tomas registradas";
        return;
      }

      const ahora = new Date();
      const hoy = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
      const ayer = new Date(hoy);
      ayer.setDate(ayer.getDate() - 1);

      // Verificar si ya tomó remedio hoy
      const tomoHoy = data.some(toma => {
        const f = new Date(toma.created_at);
        const fSinHora = new Date(f.getFullYear(), f.getMonth(), f.getDate());
        return fSinHora.getTime() === hoy.getTime();
      });

      if (tomoHoy) {
        bannerHoy.className = "banner-estado completado";
        bannerHoy.innerHTML = "🎉 ¡Remedio de hoy completado!";
      } else {
        bannerHoy.className = "banner-estado pendiente";
        bannerHoy.innerHTML = "⏰ Pendiente: Aún no registra toma hoy";
      }

      listaEl.innerHTML = '';
      data.forEach(toma => {
        const fechaObj = new Date(toma.created_at);
        const fechaSinHora = new Date(fechaObj.getFullYear(), fechaObj.getMonth(), fechaObj.getDate());

        let etiquetaRemedio = 'Remedio';
        if (fechaSinHora.getTime() === hoy.getTime()) {
          etiquetaRemedio = 'Remedio Hoy';
        } else if (fechaSinHora.getTime() === ayer.getTime()) {
          etiquetaRemedio = 'Remedio Ayer';
        } else {
          const dia = String(fechaObj.getDate()).padStart(2, '0');
          const mes = String(fechaObj.getMonth() + 1).padStart(2, '0');
          etiquetaRemedio = `Remedio ${dia}/${mes}`;
        }

        const horaTxt = fechaObj.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

        const li = document.createElement('li');
        li.className = 'toma-item';
        li.innerHTML = `
          <span class="fecha-tag">✅ ${etiquetaRemedio}</span>
          <span class="hora-tag">${horaTxt} hs</span>
        `;
        listaEl.appendChild(li);
      });
    }

    async function iniciar() {
      const urlParams = new URLSearchParams(window.location.search);
      const clave = urlParams.get('clave');
      const mensajeEl = document.getElementById('mensaje');
      const detalleEl = document.getElementById('detalle');
      const iconoEl = document.getElementById('icono');

      if (clave === CLAVE_NFC_VALIDA) {
        mensajeEl.textContent = "⏳ Registrando la toma...";
        
        const { error } = await db
          .from('tomas_remedios')
          .insert([{ medicamento: 'Remedio Mañana' }]);

        if (error) {
          iconoEl.textContent = "❌";
          mensajeEl.textContent = "Error al registrar";
          detalleEl.textContent = error.message;
        } else {
          iconoEl.textContent = "💖";
          mensajeEl.className = "status exito";
          mensajeEl.textContent = "¡Remedio registrado con éxito!";
          detalleEl.textContent = "💕Te amo mamita bella💕";

          // Tirar confeti de celebración
          confetti({
            particleCount: 80,
            spread: 60,
            origin: { y: 0.6 }
          });
        }
      } else {
        iconoEl.textContent = "📋";
        mensajeEl.textContent = "Historial de Tomas";
        detalleEl.textContent = "Estado actual del remedio:";
        cargarHistorial();
      }
    }

    iniciar();
  </script>
</body>
</html>
